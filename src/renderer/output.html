<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Output Window</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    .output-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .output-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      z-index: 1;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    
    .output-image.visible {
      opacity: 1;
    }
    
    .output-image.fade {
      transition: opacity 1s ease-in-out;
    }
  </style>
</head>
<body>
  <div class="output-container">
    <img class="output-image" id="image1" src="" alt="">
    <img class="output-image" id="image2" src="" alt="">
    
  </div>

  <script src="output.js"></script>
</body>
</html>
